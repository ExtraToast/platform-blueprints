apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixture-api
  namespace: flux-render-fixture
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fixture-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fixture-api
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.10
