apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fixture-chart
  namespace: flux-render-fixture
spec:
  interval: 10m
  chart:
    spec:
      chart: fixture
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: fixture-charts
        namespace: flux-render-fixture
  values:
    replicaCount: 1
