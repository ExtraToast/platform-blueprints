name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash -o /tmp/download-actionlint.bash
          bash /tmp/download-actionlint.bash latest /tmp

      - name: Lint GitHub Actions workflows
        shell: bash
        run: /tmp/actionlint -color .github/workflows/*.yml

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository
        shell: bash
        run: bash scripts/validate-repository.sh

      - name: Run backup tooling smoke test
        shell: bash
        run: bash tests/scripts/backup-tooling-smoke.sh

      - name: Run Nix flake check when available
        shell: bash
        run: |
          set -euo pipefail
          if command -v nix >/dev/null 2>&1; then
            nix flake check --print-build-logs
          else
            echo "nix is not available; repository validation fallback completed"
          fi

  pipeline-complete:
    name: Pipeline Complete
    if: always()
    needs: [actionlint, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
